# MediVoice — FastAPI (backend/) + static Vite (frontend/)
# Deploy: Dashboard → New → Blueprint → connect this repo (or push and sync).
# After first deploy: set secrets in the dashboard (GEMINI_API_KEY, Twilio, etc.).
#
# Custom domain medivoice.us:
#   1. Add api.medivoice.us on service medivoice-api → set PUBLIC_BASE_URL=https://api.medivoice.us
#   2. Add medivoice.us on medivoice-web → set VITE_API_BASE=https://api.medivoice.us → Manual Deploy
#
# Legacy Node scheduling stack: see render.legacy-scheduling.yaml

services:
  - type: web
    name: medivoice-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Optional: override auto URL (required once you use a custom API domain)
      - key: PUBLIC_BASE_URL
        sync: false

  - type: web
    name: medivoice-web
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    # Path is relative to repository root (see Render Blueprint spec).
    staticPublishPath: ./frontend/dist
    envVars:
      # Wired to the API service URL so the SPA calls production FastAPI (rebuild after API URL changes).
      - key: VITE_API_BASE
        fromService:
          type: web
          name: medivoice-api
          envVarKey: RENDER_EXTERNAL_URL
