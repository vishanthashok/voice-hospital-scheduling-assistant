# MediVoice API only (FastAPI). Dashboard: New → Blueprint → this repo, or connect GitHub on a Web Service with rootDir backend.
# Set env: Twilio, PUBLIC_BASE_URL, and either Bedrock (BEDROCK_MODEL_ID + AWS creds) or GEMINI_API_KEY.
services:
  - type: web
    name: medivoice-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BEDROCK_MODEL_ID
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BEARER_TOKEN_BEDROCK
        sync: false
      - key: TRIAGE_BACKEND
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GEMINI_MODEL
        sync: false
