# MediVoice API only (FastAPI). Dashboard: New → Blueprint → this repo, or connect GitHub on a Web Service with rootDir backend.
# Set env vars in Render (GEMINI_API_KEY, Twilio, PUBLIC_BASE_URL = your Render URL, no trailing slash).
services:
  - type: web
    name: medivoice-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GEMINI_MODEL
        sync: false
